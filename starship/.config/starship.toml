# =============================================================================
# Starship Prompt - Minimal Style (omerxx-inspired)
# =============================================================================
# Left: directory + character only (clean, fast)
# Right: git, languages, cloud (out of the way)
# Theme: Catppuccin Mocha
# =============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# Minimal left prompt - just where you are
format = "$directory$character"

# Everything else on the right
right_format = "$all"

# Catppuccin Mocha palette
palette = "catppuccin_mocha"

command_timeout = 1000

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[✗](bold red)'

[directory]
truncate_to_repo = true

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'

[git_status]
disabled = false

# Disable noisy modules
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true

[golang]
disabled = true

# Keep useful language indicators minimal
[nodejs]
format = '[$symbol]($style)'
symbol = "⬢ "

[python]
format = '[$symbol]($style)'

[elixir]
format = '[$symbol]($style)'
symbol = " "

[erlang]
symbol = "ⓔ "

# =============================================================================
