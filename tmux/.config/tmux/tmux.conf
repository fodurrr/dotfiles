# =============================================================================
# Tmux Configuration (omerxx-inspired)
# =============================================================================
# Features: TPM plugins, Catppuccin theme, session management, vim navigation
# =============================================================================

# Terminal & Colors
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# Prefix: Ctrl+A (easier than default Ctrl+B)
set -g prefix ^A
unbind C-b
bind C-a send-prefix

# Core Settings
set -g base-index 1              # Start windows at 1
setw -g pane-base-index 1        # Start panes at 1
set -g detach-on-destroy off     # Don't exit tmux when closing session
set -g escape-time 0             # No delay for escape
set -g history-limit 50000       # Scrollback buffer
set -g renumber-windows on       # Renumber on close
set -g set-clipboard on          # System clipboard
set -g status-position top       # Status bar at top
set -g mouse on                  # Enable mouse

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Pane borders (Catppuccin yellow for active, subtle for inactive)
set -g pane-active-border-style 'fg=#f9e2af,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# =============================================================================
# Keybindings (vim-style navigation)
# =============================================================================

# Split panes (matching Neovim)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Navigate panes (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Quick buffer list
bind b choose-buffer

# =============================================================================
# Plugins (via TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Session restore
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# =============================================================================
# Catppuccin Theme Configuration
# =============================================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# Initialize TPM (MUST be at the very end)
run '~/.tmux/plugins/tpm/tpm'
