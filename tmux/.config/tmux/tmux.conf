# =============================================================================
# tmux Configuration
# =============================================================================
# Terminal multiplexer for managing multiple terminal sessions
# =============================================================================

# Use Ctrl+a as prefix (easier than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Faster key repetition
set -s escape-time 0

# =============================================================================
# Pane Management
# =============================================================================

# Split panes (matching Neovim)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Navigate panes (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Utility
# =============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# =============================================================================
# Copy Mode (vi-style with system clipboard)
# =============================================================================
# Replaces clipboard managers like Paste app

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Quick buffer list (clipboard history)
bind b choose-buffer

# =============================================================================
# Catppuccin Theme (matches Ghostty)
# =============================================================================
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#89b4fa
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa] #S "
set -g status-right "#[fg=#cdd6f4] %H:%M "
