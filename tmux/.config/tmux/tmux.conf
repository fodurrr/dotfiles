# =============================================================================
# Tmux Configuration (omerxx-inspired)
# =============================================================================
# Features: TPM plugins, Catppuccin v2 theme, session management, vim navigation
# =============================================================================

# Terminal & Colors
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g default-terminal "${TERM}"

# Prefix: Ctrl+A (easier than default Ctrl+B)
set -g prefix ^A
unbind C-b
bind C-a send-prefix

# Core Settings
set -g base-index 1              # Start windows at 1
setw -g pane-base-index 1        # Start panes at 1
set -g detach-on-destroy off     # Don't exit tmux when closing session
set -g escape-time 0             # No delay for escape
set -g history-limit 1000000     # Scrollback buffer (1M lines)
set -g renumber-windows on       # Renumber on close
set -g set-clipboard on          # System clipboard
set -g status-position top       # Status bar at top
set -g mouse on                  # Enable mouse

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Pane borders (magenta active, subtle inactive)
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# =============================================================================
# Keybindings (vim-style navigation)
# =============================================================================

# Split panes (matching Helix/Zed)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Navigate panes (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Synchronize panes (type in all panes at once)
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"

# Quick buffer list
bind b choose-buffer

# =============================================================================
# Plugins (via TPM)
# =============================================================================
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session restore (manual: prefix + Ctrl+s to save, prefix + Ctrl+r to restore)
set -g @continuum-restore 'off'
set -g @resurrect-strategy-nvim 'session'

# =============================================================================
# Catppuccin v2 Theme Configuration
# =============================================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "#1e1e2e"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_text_color "#1e1e2e"
set -g @catppuccin_window_current_text_color "#1e1e2e"
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

# Load Catppuccin theme (must happen before status-left/right)
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# Status line modules
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"

# Initialize TPM (MUST be at the very end)
run '~/.config/tmux/plugins/tpm/tpm'
