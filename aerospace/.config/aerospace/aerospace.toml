# =============================================================================
# Aerospace Configuration
# =============================================================================
# i3-like tiling window manager for macOS
# https://nikitabobko.github.io/AeroSpace/guide
# =============================================================================

# Start AeroSpace at login
start-at-login = true

# Default to tiled layout (not accordion/fullscreen)
default-root-container-layout = 'tiles'

# Start JankyBorders for active window highlighting (yellow, more visible)
after-startup-command = [
    'exec-and-forget borders active_color=0xfff9e2af inactive_color=0xff313244 width=6.0'
]

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Notify SketchyBar on workspace change
exec-on-workspace-change = [
    '/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# =============================================================================
# Gaps
# =============================================================================
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.right = 10
outer.top = 55
outer.bottom = 10

# =============================================================================
# Main Mode Bindings
# =============================================================================
[mode.main.binding]
# --- Navigation (Alt + hjkl) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move windows (Alt + Shift + hjkl) ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Resize (Alt + minus/plus) ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Layout toggles ---
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# --- Fullscreen ---
alt-f = 'fullscreen'

# --- Workspaces (Alt + 1-5) ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# --- Move to workspace (Alt + Shift + 1-5) ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# --- Float toggle ---
alt-shift-space = 'layout floating tiling'

# --- Cheatsheet (alt-? = alt-shift-slash) ---
alt-shift-slash = 'exec-and-forget ~/.config/cheatsheet/show-cheatsheet.sh'

# =============================================================================
# Window Rules
# =============================================================================
# (Cheatsheet window floats itself via aerospace command in display script)
