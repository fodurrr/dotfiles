version = 1

# TERMINALS
[macos.terminals]
# apps = ["ghostty"]  # Commented out: Ghostty has crash issues on macOS Tahoe
apps = ["wezterm"]

# BROWSERS
[macos.browsers]
apps = ["google-chrome"]

# CONFIG
[macos.config]
# "ghostty-config" commented out — see terminals section
apps = ["raycast-config", "git-config", "zsh-config", "sheldon-config", "starship-config", "wezterm-config", "terminal-config", "mise-config"]

# PRODUCTIVITY
[macos.productivity]
apps = ["raycast"]

# FONTS
[macos.fonts]
apps = ["font-jetbrains-mono-nerd-font"]

# CLI
[macos.cli]
apps = ["starship", "eza", "bat", "fzf", "sheldon", "mole"]

# CONFIG
[linux.config]
apps = ["git-config", "zsh-config", "sheldon-config", "starship-config", "mise-config"]

# CLI
[linux.cli]
apps = ["starship", "eza", "bat", "fzf", "sheldon-linux"]

