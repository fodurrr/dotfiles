theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = true
bufferline = "multiple"
color-modes = true
true-color = true
rulers = [80, 120]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true

[editor.soft-wrap]
enable = true

[keys.normal]
# Quick save
"C-s" = ":write"
# Buffer navigation (similar to Zed)
"S-h" = ":buffer-previous"
"S-l" = ":buffer-next"
"S-q" = ":buffer-close"
