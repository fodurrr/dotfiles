[tools]
# =====================================================
# Programming Languages
# =====================================================
# Erlang & Elixir:
erlang = "28.3"          # Will get latest 28.3.x
elixir = "1.19.5-otp-28" # We pin OTP version for compatibility
# Rust: "stable" ensures you are always on the official stable channel.
rust = "stable"
# Node: "lts" automatically grabs the active LTS version
node = "lts"
# Go: "latest" is generally safe for Go as it has strict backward compatibility.
# go = "latest"
# Python: "3.14" will automatically grab 3.14.0, 3.14.1, etc. as they release.
# You can use "latest", but pinning Major.Minor is safer for projects.
python = "3.14"
# =====================================================
# Prompts
# =====================================================
starship = "1.24" # Fast, customizable prompt with smart defaults
# =====================================================
# Terminals / Multiplexers
# =====================================================
# tmux = "3.6a" # Industry-standard terminal multiplexer
# zellij = "0.43" # Modern Rust-based terminal multiplexer
# =====================================================
# Editors
# =====================================================
# neovim = "0.11" # Hyperextensible vim-based editor
# =====================================================
# Node Package Managers
# =====================================================
bun = "1.3"    # All-in-one JS runtime and package manager
pnpm = "10.28" # Fast, disk-efficient package manager
# yarn = "4.12" # Alternative package manager by Facebook
# =====================================================
# Containers
# =====================================================
# podman = "5.7" # Daemonless container runtime
# =====================================================
# Git Tools
# =====================================================
gh = "2.85" # GitHub CLI for PRs, issues, etc.
# lazygit = "0.58" # Terminal UI for git commands
# delta = "0.18" # Beautiful syntax-highlighted diffs
# gitui = "0.28" # Fast terminal UI for git
# =====================================================
# CLI Tools
# =====================================================
eza = "0.23"     # Modern ls with icons and git info
bat = "0.26"     # Cat with syntax highlighting
ripgrep = "15.1" # Fast recursive grep replacement
fzf = "0.67"     # General-purpose fuzzy finder
jq = "1.8"       # Lightweight JSON processor
yq = "4.50"      # Lightweight YAML processor
# zoxide = "0.9" # Smart cd that learns your habits
# fd = "10.3" # Fast, user-friendly find alternative
# =====================================================
# AI coding tools
# =====================================================
claude ="latest"
gemini-cli = "latest"
codex = "latest"
opencode = "latest"

# =====================================================
# Extras
# =====================================================
direnv = "2.37" # Directory-based environment variables
[settings]
# informational, error, warn, debug
log_level = "info"
# prompt to install missing tools
experimental = true
# default to always yes for installation prompts if preferred
# yes = true
